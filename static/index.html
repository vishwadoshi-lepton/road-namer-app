// Render whichever panel list is active (normal corridor list vs merge list).
function renderPanel() { if (mergeMode) renderMergePanel(); else renderCorrList(); }

// ── Merge mode ─────────────────────────────────────────────────────
function liveSegments() { return projectData ? projectData.segments : []; }

function near2(a, b, tol = 1e-4) { return Math.abs(a[0]-b[0]) < tol && Math.abs(a[1]-b[1]) < tol; }

// ids -> {ok, reason, order:[ids]} — mirrors merge.order_chain on the server.
function validateChain(ids) {
  const segs = ids.map(id => projectData.segments.find(s => s.id === id)).filter(Boolean);
  if (segs.length < 2) return { ok: false, reason: 'Select at least two segments.', order: [] };
  const start = s => s.coords[0], end = s => s.coords[s.coords.length - 1];
  const starts = segs.filter(s => !segs.some(o => o !== s && near2(start(s), end(o))));
  if (starts.length === 0) {
    if (segs.length === 2 && near2(start(segs[0]), end(segs[1])) && near2(end(segs[0]), start(segs[1])))
      return { ok: false, reason: 'Two segments run in opposite directions.', order: [] };
    return { ok: false, reason: 'Segments form a loop.', order: [] };
  }
  if (starts.length > 1) return { ok: false, reason: "Segments don't connect end to end.", order: [] };
  const order = [starts[0]]; const used = new Set([starts[0].id]); let cur = starts[0];
  while (order.length < segs.length) {
    const nxts = segs.filter(s => !used.has(s.id) && near2(end(cur), start(s)));
    if (nxts.length === 0) return { ok: false, reason: "Segments don't connect end to end.", order: [] };
    if (nxts.length > 1) return { ok: false, reason: 'Segments branch; pick a single path.', order: [] };
    cur = nxts[0]; order.push(cur); used.add(cur.id);
  }
  return { ok: true, reason: `Connected chain of ${order.length}`, order: order.map(s => s.id) };
}

function enterMergeMode() {
  if (!projectData) return;
  if (previewRootId) clearPreviewState();
  mergeMode = true;
  mergeSelection = new Set();
  mergeName = '';
  selectedCorrId = null; openCorrId = null;
  const btn = document.getElementById('btn-merge');
  btn.classList.add('active'); btn.textContent = 'Exit merge';
  document.getElementById('filter-bar').style.display = 'none';
  renderMergeMap();
  renderMergePanel();
}

function exitMergeMode() {
  mergeMode = false;
  mergeSelection = new Set();
  mergeName = '';
  clearMergeOverlay();
  document.getElementById('merge-chooser').style.display = 'none';
  const btn = document.getElementById('btn-merge');
  btn.classList.remove('active'); btn.textContent = 'Merge';
  document.getElementById('filter-bar').style.display = 'flex';
  renderMap();
  renderCorrList();
}

// The current selection in chain order (trivial for 0/1, validated for 2+).
function orderedSelectionSegs() {
  const ids = [...mergeSelection];
  if (ids.length === 0) return [];
  if (ids.length === 1) { const s = projectData.segments.find(x => x.id === ids[0]); return s ? [s] : []; }
  const v = validateChain(ids);
  const order = v.ok ? v.order : ids;
  return order.map(id => projectData.segments.find(s => s.id === id)).filter(Boolean);
}

// Set of live segment ids that may be ADDED next (connect to head or tail,
// without closing a loop). When nothing is selected, anything can start a chain.
function mergeCandidates() {
  const segs = liveSegments();
  if (mergeSelection.size === 0) return new Set(segs.map(s => s.id));
  const order = orderedSelectionSegs();
  if (!order.length) return new Set();
  const head = order[0].coords[0];
  const tail = order[order.length - 1].coords[order[order.length - 1].coords.length - 1];
  const cand = new Set();
  segs.forEach(s => {
    if (mergeSelection.has(s.id)) return;
    const st = s.coords[0], en = s.coords[s.coords.length - 1];
    const appendOK = near2(st, tail) && !near2(en, head);
    const prependOK = near2(en, head) && !near2(st, tail);
    if (appendOK || prependOK) cand.add(s.id);
  });
  return cand;
}

// Guarded toggle: add only a connecting candidate; remove only from the two ends.
function toggleMergeSeg(id) {
  if (mergeSelection.has(id)) {
    const order = orderedSelectionSegs();
    const isEnd = order.length && (id === order[0].id || id === order[order.length - 1].id);
    if (!isEnd) { showHint('You can only remove from the ends'); return; }
    mergeSelection.delete(id);
  } else {
    if (!mergeCandidates().has(id)) { showHint("That segment doesn't connect to your selection"); return; }
    mergeSelection.add(id);
  }
  // Auto pre-fill the name when the selected segments share one saved name.
  if (!mergeName) {
    const names = [...new Set([...mergeSelection]
      .map(sid => projectData.segments.find(s => s.id === sid))
      .filter(Boolean).map(s => s.name).filter(Boolean))];
    if (names.length === 1) mergeName = names[0];
  }
  renderMergeMap();
  renderMergePanel();
}

function clearMergeOverlay() {
  mergeOverlayPolylines.forEach(p => p.setMap(null));
  mergeOverlayPolylines = [];
  clearMergeHighlight();
}
function clearMergeHighlight() { mergeHighlight.forEach(m => m.setMap(null)); mergeHighlight = []; }

function renderMergeMap() {
  if (!googleMap || !projectData) return;
  Object.values(corridorPolylines).forEach(pl => pl.setMap(null));
  clearChildPolylines();
  clearMergeOverlay();

  const cands = mergeSelection.size ? mergeCandidates() : null;
  liveSegments().forEach(seg => {
    const path = lngLatToGM(seg.coords);
    if (path.length < 2) return;
    const isSel = mergeSelection.has(seg.id);
    let color, weight, opacity;
    if (isSel) { color = '#2563eb'; weight = 8; opacity = 1; }                                 // selected = blue
    else if (mergeSelection.size === 0) { color = seg.named ? COLOR_NAMED : COLOR_UNNAMED; weight = 6; opacity = 1; }
    else if (cands.has(seg.id)) { color = '#ef4444'; weight = 7; opacity = 1; }                // connectable = red
    else { color = '#cbd5e1'; weight = 5; opacity = 0.5; }                                     // ineligible = dimmed
    const pl = new google.maps.Polyline({
      path, map: googleMap, strokeColor: color, strokeWeight: weight, strokeOpacity: opacity,
      zIndex: isSel ? 5 : (color === '#ef4444' ? 4 : 2)
    });
    pl.addListener('click', (e) => onMergeMapClick(seg.id, e));
    mergeOverlayPolylines.push(pl);
    if (isSel) {
      const a = path[path.length - 2], b = path[path.length - 1];
      const arrow = new google.maps.Marker({ position: b, map: googleMap, clickable: false, zIndex: 6,
        icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 3.5,
                rotation: headingDeg(a, b), fillColor: '#2563eb', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 1 } });
      mergeOverlayPolylines.push(arrow);
    }
  });
}

// On a polyline click, find ALL live segments under the cursor, then keep only the
// ACTIONABLE ones (a connectable candidate, or one of the two removable end segments).
// 0 -> hint; exactly 1 -> do it silently; 2+ -> show the chooser to disambiguate.
function onMergeMapClick(segId, e) {
  const under = liveSegments().filter(s => segmentNearLatLng(s, e.latLng));
  const cands = mergeCandidates();
  const order = orderedSelectionSegs();
  const endIds = order.length ? [order[0].id, order[order.length - 1].id] : [];
  const actionable = under.filter(s => cands.has(s.id) || endIds.includes(s.id));
  if (actionable.length === 0) {
    showHint(under.length ? "That segment doesn't connect to your selection" : 'No segment here');
    return;
  }
  if (actionable.length === 1) { toggleMergeSeg(actionable[0].id); return; }
  showMergeChooser(actionable, e);
}

function segmentNearLatLng(seg, latLng) {
  const proj = googleMap.getProjection();
  if (!proj || !latLng) return false;
  const scale = Math.pow(2, googleMap.getZoom());
  const toPx = ll => { const p = proj.fromLatLngToPoint(ll); return { x: p.x * scale, y: p.y * scale }; };
  const c = toPx(latLng);
  const path = seg.coords.map(([lng, lat]) => toPx(new google.maps.LatLng(lat, lng)));
  const TH = 8;
  for (let i = 1; i < path.length; i++) {
    if (ptSegDistPx(c, path[i-1], path[i]) <= TH) return true;
  }
  return false;
}

function ptSegDistPx(p, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const l2 = dx*dx + dy*dy;
  let t = l2 ? ((p.x-a.x)*dx + (p.y-a.y)*dy) / l2 : 0;
  t = Math.max(0, Math.min(1, t));
  const x = a.x + t*dx, y = a.y + t*dy;
  return Math.hypot(p.x - x, p.y - y);
}

function showMergeChooser(candidates, e) {
  const box = document.getElementById('merge-chooser');
  box.innerHTML = candidates.map(s => {
    const nm = s.name || s.route_name_imported || ('Segment ' + s.id);
    const mark = mergeSelection.has(s.id) ? '✓ ' : '';
    return `<div class="mch-row" data-id="${s.id}">${mark}${esc(nm)} · ${fmtLen(segLengthM(s.coords))}</div>`;
  }).join('');
  const ev = e.domEvent || {};
  box.style.left = ((ev.clientX || 100) + 6) + 'px';
  box.style.top  = ((ev.clientY || 100) + 6) + 'px';
  box.style.display = 'block';
  // Ignore the document-level outside-click fired by this very opening click.
  box.dataset.justOpened = '1';
  setTimeout(() => { delete box.dataset.justOpened; }, 0);
  box.querySelectorAll('.mch-row').forEach(row => {
    const id = Number(row.dataset.id);
    row.addEventListener('mouseenter', () => highlightSegOnMap(id));
    row.addEventListener('mouseleave', clearMergeHighlight);
    row.addEventListener('click', () => { box.style.display = 'none'; clearMergeHighlight(); toggleMergeSeg(id); });
  });
}

function highlightSegOnMap(id) {
  clearMergeHighlight();
  const seg = projectData.segments.find(s => s.id === id);
  if (!seg) return;
  const path = lngLatToGM(seg.coords);
  if (path.length < 2) return;
  const hl = new google.maps.Polyline({ path, map: googleMap, strokeColor: '#f59e0b', strokeWeight: 10, strokeOpacity: .9, zIndex: 20, clickable: false });
  const a = path[path.length - 2], b = path[path.length - 1];
  const arrow = new google.maps.Marker({ position: b, map: googleMap, clickable: false, zIndex: 21,
    icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 4, rotation: headingDeg(a, b), fillColor: '#f59e0b', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 1 } });
  mergeHighlight.push(hl, arrow);
}

function renderMergePanel() {
  const container = document.getElementById('corridor-list');
  if (!projectData) { container.innerHTML = ''; return; }
  const ids = [...mergeSelection];
  const v = validateChain(ids);
  const orderIndex = {}; orderedSelectionSegs().forEach((s, i) => orderIndex[s.id] = i + 1);
  const cands = mergeSelection.size ? mergeCandidates() : null;

  const rowHtml = (seg) => {
    const sel = mergeSelection.has(seg.id);
    const num = orderIndex[seg.id] || '';
    const nm = seg.name || seg.route_name_imported || ('Segment ' + seg.id);
    const mergedTag = seg.is_merged ? ` <span class="merged-tag">merged (${seg.merged_from.length})</span>` : '';
    let cls = 'merge-seg-row';
    if (sel) cls += ' sel';
    else if (cands && cands.has(seg.id)) cls += ' cand';
    else if (cands) cls += ' dim';
    return `<div class="${cls}" data-id="${seg.id}">
      <span class="ms-badge">${num}</span>
      <span class="ms-name">${esc(nm)}${mergedTag}</span>
      <span class="ms-len">${fmtLen(segLengthM(seg.coords))}</span></div>`;
  };

  const items = getVisibleCorridors().filter(c => itemMatchesSearch(c));
  const corrItems = items.filter(i => !i.isStandalone);
  const saItems = items.filter(i => i.isStandalone);

  let listHtml = '';
  corrItems.forEach(g => {
    listHtml += `<div class="merge-group-h">${esc(g.name || g.cor_code)}</div>` +
      segmentsOfItem(g).map(rowHtml).join('');
  });
  if (saItems.length) {
    listHtml += `<div class="merge-group-h">Standalone</div>` +
      saItems.map(g => segmentsOfItem(g)).flat().map(rowHtml).join('');
  }

  const bannerTxt = ids.length < 2
    ? (ids.length ? 'Pick one more connected segment' : 'Click segments to merge (map or list)')
    : (v.ok ? '✓ ' + v.reason : '✗ ' + v.reason);

  container.innerHTML = `
    <div id="merge-controls">
      <div class="mc-row"><strong>Merge</strong> · <span>${ids.length} selected</span>
        <span style="flex:1"></span>
        <button id="btn-cancel-merge">Cancel</button></div>
      <div class="mc-banner ${v.ok ? 'mc-ok' : 'mc-bad'}">${esc(bannerTxt)}</div>
      <input id="merge-name" type="text" placeholder="Name (optional)…" value="${esc(mergeName)}"/>
      <button id="btn-do-merge" ${v.ok ? '' : 'disabled'}>Merge ${ids.length || ''} → 1</button>
    </div>
    ${listHtml}
  `;

  container.querySelectorAll('.merge-seg-row').forEach(row =>
    row.addEventListener('click', () => toggleMergeSeg(Number(row.dataset.id))));
  document.getElementById('btn-cancel-merge').addEventListener('click', exitMergeMode);
  document.getElementById('btn-do-merge').addEventListener('click', doMerge);
  document.getElementById('merge-name').addEventListener('input', e => { mergeName = e.target.value; });
}

async function doMerge() {
  const ids = [...mergeSelection];
  try {
    const res = await apiFetch(`/api/projects/${currentProjectId}/merge`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ segment_ids: ids, name: mergeName })
    });
    exitMergeMode();
    projectData = await apiFetch(`/api/projects/${currentProjectId}`);
    updateProgressUI();
    renderCorrList();
    renderMap();
    if (res.merged_segment_id) {
      const corrId = res.corridor_id !== null ? res.corridor_id : ('sa_' + res.merged_segment_id);
      selectCorridor(corrId, 'merge');
    }
    showSaveIndicator();
  } catch (err) {
    alert('Merge failed: ' + err.message);
  }
}

// ── Quick merge (whole corridor → one standalone segment) ──────────
function corridorChainable(corr) {
  if (corr.isStandalone) return false;
  const segs = segmentsOfCorridor(corr.id);
  if (segs.length < 2) return false;
  return validateChain(segs.map(s => s.id)).ok;
}

function openQuickMergeModal(corr) {
  const segs = segmentsOfCorridor(corr.id);
  const prefill = corr.name || corrSuggestion(corr) || '';
  showModal({
    title: 'Quick-merge corridor',
    message: `Merge all ${segs.length} segments of this corridor into one standalone segment?`,
    withInput: true, inputValue: prefill, confirmText: 'Merge',
    onConfirm: (name) => quickMerge(corr, name)
  });
}

async function quickMerge(corr, name) {
  const ids = segmentsOfCorridor(corr.id).map(s => s.id);
  try {
    const res = await apiFetch(`/api/projects/${currentProjectId}/merge`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ segment_ids: ids, name: name || '' })
    });
    projectData = await apiFetch(`/api/projects/${currentProjectId}`);
    updateProgressUI(); renderCorrList(); renderMap();
    if (res.merged_segment_id) selectCorridor('sa_' + res.merged_segment_id, 'merge');
    showSaveIndicator();
  } catch (err) { alert('Quick merge failed: ' + err.message); }
}

// ── Home / project list ───────────────────────────────────────────
async function loadProjects() {
  const list = document.getElementById('project-list');
  const loading = document.getElementById('home-loading');
  try {
    const projects = await apiFetch('/api/projects');
    loading.style.display = 'none';
    if (!projects.length) {
      list.innerHTML = '<div class="empty-state">No projects available yet.</div>';
      return;
    }
    list.innerHTML = '';
    projects.forEach(proj => {
      const item = document.createElement('div');
      item.className = 'project-item';
      item.innerHTML = `
        <div style="flex:1;min-width:0">
          <div class="proj-name">${esc(proj.name)}</div>
          <div class="proj-meta">${proj.seg_count} segments · ${proj.named_count || 0} named</div>
        </div>
        <button class="proj-del" data-id="${proj.id}" title="Delete project">✕</button>
      `;
      item.addEventListener('click', (e) => {
        if (e.target.classList.contains('proj-del')) return;
        openProject(proj.id);
      });
      item.querySelector('.proj-del').addEventListener('click', async () => {
        if (!confirm(`Delete project "${proj.name}"?`)) return;
        try {
          await apiFetch(`/api/projects/${proj.id}`, { method: 'DELETE' });
          await loadProjects();
        } catch(e) { alert('Delete failed: ' + e.message); }
      });
      list.appendChild(item);
    });
  } catch(e) {
    loading.textContent = 'Could not load projects. Is the server running?';
  }
}

async function openProject(id) {
  // Flush any pending debounced saves before switching projects
  flushPendingSaves();
  currentProjectId = id;
  document.getElementById('btn-export').disabled = false;

  // Show loading in panel
  document.getElementById('home').style.display = 'none';
  document.getElementById('project-view').style.display = 'flex';
  document.getElementById('project-view').style.flexDirection = 'column';
  document.getElementById('corridor-list').innerHTML = '<div class="loading">Loading project…</div>';

  try {
    projectData = await apiFetch(`/api/projects/${id}`);
  } catch(e) {
    document.getElementById('corridor-list').innerHTML = `<div class="empty-state">Error loading project: ${esc(e.message)}</div>`;
    return;
  }

  document.getElementById('project-name-label').textContent = projectData.project.name;
  document.getElementById('header-progress').style.display = 'flex';
  document.getElementById('btn-next-unnamed').style.display = 'block';
  document.getElementById('btn-merge').style.display = 'block';

  updateProgressUI();
  renderCorrList();

  // Map
  if (googleMap) {
    renderMap();
    fitMapToCorridors();
  }
}

// ── Import ─────────────────────────────────────────────────────────
async function handleImport(file) {
  if (!file) return;
  const status = document.getElementById('import-status');
  status.textContent = 'Importing…';

  const fd = new FormData();
  fd.append('file', file, file.name);

  try {
    const res = await apiFetch('/api/projects', { method: 'POST', body: fd });
    status.textContent = '';
    await openProject(res.project_id);
  } catch(e) {
    status.textContent = 'Import failed: ' + e.message;
  }
  document.getElementById('file-input').value = '';
}

// ── Export ─────────────────────────────────────────────────────────
function triggerExport() {
  if (!currentProjectId) return;
  const a = document.createElement('a');
  a.href = `/api/projects/${currentProjectId}/export`;
  a.download = '';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ── Filter chips ───────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.filter === f);
  });
  renderCorrList();
}

// ── Keyboard ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const ov = document.getElementById('app-modal-overlay');
    if (ov && ov.classList.contains('show')) { closeModal(); return; }
    const box = document.getElementById('merge-chooser');
    if (box && box.style.display === 'block') { box.style.display = 'none'; clearMergeHighlight(); return; }
    if (previewRootId) { closePreview(); return; }
    if (mergeMode) { exitMergeMode(); return; }
    deselectCorridor();
    return;
  }
  if (e.key === 'Enter') {
    if (mergeMode) return;
    // Only trigger next-unnamed if no input is focused
    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
    jumpToNextUnnamed();
  }
});

// ── Drag & drop import ─────────────────────────────────────────────
const importArea = document.getElementById('import-area');
importArea.addEventListener('dragover', e => { e.preventDefault(); importArea.style.borderColor = '#4f7bbf'; });
importArea.addEventListener('dragleave', () => { importArea.style.borderColor = ''; });
importArea.addEventListener('drop', e => {
  e.preventDefault();
  importArea.style.borderColor = '';
  const file = e.dataTransfer.files[0];
  if (file) handleImport(file);
});

// ── Google Maps init ───────────────────────────────────────────────
function initGoogleMap() {
  googleMap = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 25.5, lng: 91.9 },
    zoom: 12,
    mapTypeControl: true,
    streetViewControl: true,
    fullscreenControl: true,
    zoomControl: true
  });
  initMapClickDeselect();
  initPlacesSearch();
  mapsLoaded = true;

  // If a project is already loaded, render

    renderMap();
    fitMapToCorridors();
  }
}

// Called by Google Maps script as callback
window.initGoogleMap = initGoogleMap;

// ── Boot ───────────────────────────────────────────────────────────
async function boot() {
  // Load API config
  let mapsKey = '';
  try {
    const cfg = await apiFetch('/api/config');
    mapsKey = cfg.maps_key || '';
    MAPS_KEY = mapsKey;
  } catch(e) {
    console.warn('Could not fetch /api/config:', e.message);
  }

  if (mapsKey) {
    // Load Google Maps JS dynamically
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(mapsKey)}&callback=initGoogleMap`;
    script.async = true;
    script.defer = true;
    script.onerror = () => {
      document.getElementById('map-no-key').style.display = 'flex';
      document.getElementById('map').style.display = 'none';
    };
    document.head.appendChild(script);
  } else {
    document.getElementById('map-no-key').style.display = 'flex';
    document.getElementById('map').style.display = 'none';
  }

  // Load project list
  await loadProjects();

  // Wire up controls
  document.getElementById('btn-back').addEventListener('click', () => {
    // Flush any pending debounced saves before tearing down project state
    flushPendingSaves();
    if (previewRootId) clearPreviewState();
    if (mergeMode) exitMergeMode();
    document.getElementById('btn-merge').style.display = 'none';
    // Return to home
    selectedCorrId = null;
    openCorrId = null;
    currentProjectId = null;
    projectData = null;
    document.getElementById('project-view').style.display = 'none';
    document.getElementById('home').style.display = 'block';
    document.getElementById('header-progress').style.display = 'none';
    document.getElementById('btn-next-unnamed').style.display = 'none';
    document.getElementById('btn-export').disabled = true;
    if (googleMap) {
      Object.values(corridorPolylines).forEach(pl => pl.setMap(null));
      corridorPolylines = {};
      clearChildPolylines();
    }
    loadProjects();
  });

  document.getElementById('btn-next-unnamed').addEventListener('click', jumpToNextUnnamed);
  document.getElementById('btn-export').addEventListener('click', triggerExport);
  document.getElementById('btn-merge').addEventListener('click', () => mergeMode ? exitMergeMode() : enterMergeMode());

  // Dismiss the overlap chooser when clicking outside it.
  document.addEventListener('click', e => {
    const box = document.getElementById('merge-chooser');
    if (box && box.style.display === 'block' && !box.dataset.justOpened && !e.target.closest('#merge-chooser')) {
      box.style.display = 'none'; clearMergeHighlight();
    }
  });

  // Close the modal when clicking the dimmed overlay.
  document.getElementById('app-modal-overlay').addEventListener('click', e => {
    if (e.target.id === 'app-modal-overlay') closeModal();
  });

  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) handleImport(e.target.files[0]);
  });

  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => setFilter(chip.dataset.filter));
  });

  const panelSearch = document.getElementById('panel-search');
  panelSearch.addEventListener('input', e => {
    searchQuery = e.target.value;
    if (previewRootId) clearPreviewState();
    renderPanel();
  });
  const panelSearchClear = document.getElementById('panel-search-clear');
  panelSearchClear.addEventListener('mousedown', e => e.preventDefault()); // keep focus
  panelSearchClear.addEventListener('click', () => {
    panelSearch.value = '';
    searchQuery = '';
    renderPanel();
    panelSearch.focus();
  });
}

// Start
boot();
</script>
</body>
</html>
