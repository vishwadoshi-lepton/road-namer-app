<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Road Namer</title>
<style>
/* ─── Reset & Base ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; font-size: 14px; color: #1a1a2e; background: #f0f2f5; }

/* ─── Layout ────────────────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; }

/* Header */
#header {
  display: flex; align-items: center; gap: 12px; padding: 0 16px;
  background: #fff; border-bottom: 1px solid #e2e8f0;
  height: 52px; flex-shrink: 0; z-index: 10;
}
#header h1 { font-size: 16px; font-weight: 700; color: #1a1a2e; white-space: nowrap; }
#header-progress { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
#progress-label { font-size: 12px; color: #64748b; white-space: nowrap; }
#progress-bar-wrap { flex: 1; max-width: 200px; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
#progress-bar { height: 100%; width: 0; background: #54c08a; border-radius: 3px; transition: width 0.3s; }
#btn-next-unnamed {
  padding: 6px 14px; background: #4f7bbf; color: #fff; border: none; border-radius: 6px;
  font-size: 13px; cursor: pointer; white-space: nowrap; font-weight: 500;
}
#btn-next-unnamed:hover { background: #3d6aae; }
#btn-export {
  padding: 6px 14px; background: #fff; color: #4f7bbf; border: 1.5px solid #4f7bbf;
  border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; font-weight: 500;
}
#btn-export:hover { background: #eef3fb; }
#btn-export:disabled { opacity: 0.4; cursor: default; }
#btn-merge { padding: 6px 14px; background:#fff; color:#6d3fbf; border:1.5px solid #c4b5fd; border-radius:6px; font-size:13px; cursor:pointer; white-space:nowrap; font-weight:500; }
#btn-merge:hover { background:#f5f3ff; }
#btn-merge.active { background:#6d3fbf; color:#fff; border-color:#6d3fbf; }

/* Merge mode panel */
#merge-controls { padding:10px 12px; border-bottom:1px solid #e2e8f0; background:#faf9ff; position:sticky; top:0; z-index:2; }
#merge-controls .mc-row { display:flex; align-items:center; gap:8px; }
#merge-controls .mc-banner { font-size:12px; margin:6px 0; }
#merge-controls .mc-ok { color:#15803d; }
#merge-controls .mc-bad { color:#b91c1c; }
#merge-controls input { width:100%; box-sizing:border-box; border:1px solid #e2e8f0; border-radius:6px; padding:6px 9px; font-size:13px; outline:none; margin:6px 0; }
#merge-controls button { padding:6px 12px; border-radius:6px; font-size:13px; cursor:pointer; border:1px solid transparent; }
#btn-do-merge { background:#6d3fbf; color:#fff; width:100%; }
#btn-do-merge:disabled { opacity:.4; cursor:default; }
#btn-cancel-merge { background:#fff; color:#64748b; border-color:#e2e8f0; }
.merge-group-h { font-size:11px; font-weight:700; color:#64748b; padding:8px 6px 2px; }
.merge-seg-row { display:flex; align-items:center; gap:8px; border:1px solid #e2e8f0; border-radius:7px; padding:8px 10px; margin:4px 6px; cursor:pointer; }
.merge-seg-row.sel { border-color:#6d3fbf; background:#f5f3ff; }
.merge-seg-row .ms-badge { width:20px;height:20px;border-radius:50%;background:#6d3fbf;color:#fff;font-size:11px;font-weight:700;display:none;align-items:center;justify-content:center;flex-shrink:0; }
.merge-seg-row.sel .ms-badge { display:inline-flex; }
.merge-seg-row .ms-name { flex:1;min-width:0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.merge-seg-row .ms-len { color:#94a3b8;font-size:11px;flex-shrink:0; }
#merge-chooser { position:fixed; z-index:10000; background:#fff; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,.25); overflow:hidden; display:none; min-width:180px; }
#merge-chooser .mch-row { padding:8px 12px; font-size:12px; cursor:pointer; }
#merge-chooser .mch-row:hover { background:#f5f3ff; }
.merge-seg-row.cand { border-color:#ef4444; }
.merge-seg-row.dim { opacity:.45; }

/* Hint toast */
#hint-toast { position:fixed; bottom:60px; left:50%; transform:translateX(-50%); z-index:10001;
  background:#1a1a2e; color:#fff; padding:8px 16px; border-radius:8px; font-size:13px; opacity:0;
  transition:opacity .2s; pointer-events:none; box-shadow:0 2px 10px rgba(0,0,0,.25); }
#hint-toast.show { opacity:.96; }

/* Shared modal */
#app-modal-overlay { position:fixed; inset:0; background:rgba(15,19,32,.45); z-index:10002;
  display:none; align-items:center; justify-content:center; }
#app-modal-overlay.show { display:flex; }
#app-modal { background:#fff; border-radius:12px; padding:18px 18px 16px; width:min(380px,92%);
  box-shadow:0 10px 40px rgba(0,0,0,.3); }
#app-modal h3 { font-size:15px; font-weight:700; margin-bottom:8px; }
#app-modal p { font-size:13px; color:#475569; margin-bottom:12px; }
#app-modal input { width:100%; box-sizing:border-box; border:1px solid #e2e8f0; border-radius:7px;
  padding:8px 10px; font-size:13px; outline:none; margin-bottom:14px; }
#app-modal input:focus { border-color:#4f7bbf; }
#app-modal .modal-actions { display:flex; justify-content:flex-end; gap:8px; }
#app-modal button { padding:7px 14px; border-radius:7px; font-size:13px; cursor:pointer; border:1px solid transparent; }
#app-modal .m-cancel { background:#fff; color:#64748b; border-color:#e2e8f0; }
#app-modal .m-confirm { background:#6d3fbf; color:#fff; }

/* Merged badge + unmerge button on segment cards */
.merged-tag { margin-left:6px; font-size:10px; font-weight:700; color:#6d3fbf; background:#f5f3ff; border:1px solid #d4c5f9; border-radius:10px; padding:1px 7px; }
.unmerge-btn { margin-top:7px; padding:4px 10px; font-size:11px; border-radius:6px; border:1px solid #d4c5f9; background:#f5f3ff; color:#6d3fbf; cursor:pointer; }
.unmerge-btn:hover { background:#ede9fe; }

/* Parts preview */
.preview-btn { margin-top:7px; margin-left:6px; padding:4px 10px; font-size:11px; border-radius:6px; border:1px solid #c7d2fe; background:#eef2ff; color:#4338ca; cursor:pointer; }
.preview-btn:hover { background:#e0e7ff; }
.preview-block { margin-top:8px; border-top:1px dashed #e2e8f0; padding-top:8px; }
.preview-crumbs { font-size:11px; color:#64748b; margin-bottom:6px; }
.preview-crumbs .crumb { color:#4338ca; cursor:pointer; }
.preview-crumbs .crumb:hover { text-decoration:underline; }
.preview-part { display:flex; align-items:center; gap:8px; border:1px solid #e2e8f0; border-radius:6px; padding:6px 8px; margin:4px 0; }
.preview-part.pv-hover { border-color:#1e293b; background:#f8fafc; }
.preview-part.pv-merged { cursor:pointer; }
.preview-part .pv-num { width:18px;height:18px;border-radius:50%;color:#fff;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0; }
.preview-part .pv-name { flex:1;min-width:0;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.preview-part .pv-len { font-size:11px;color:#94a3b8;flex-shrink:0; }
.preview-close { margin-top:6px; padding:4px 10px; font-size:11px; border-radius:6px; border:1px solid #e2e8f0; background:#fff; color:#64748b; cursor:pointer; }

/* Body */
#body { display: flex; flex: 1; min-height: 0; }

/* Map */
#map-container { flex: 62; position: relative; }
#map { width: 100%; height: 100%; }

/* Places search overlay (top-center of the map) */
#places-search { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 5; width: min(380px, 60%); }
#places-search .places-icon { position: absolute; left: 12px; top: 9px; color: #5f6368; font-size: 16px; pointer-events: none; }
#places-input { width: 100%; box-sizing: border-box; height: 38px; padding: 0 34px; border: 1px solid #dadce0;
  border-radius: 22px; background: #fff; font-size: 14px; color: #202124; box-shadow: 0 1px 4px rgba(0,0,0,.18); outline: none; }
#places-input:focus { border-color: #4f8cff; box-shadow: 0 1px 6px rgba(79,140,255,.35); }
.places-clear { position: absolute; right: 8px; top: 7px; width: 24px; height: 24px; border: none; background: transparent;
  color: #5f6368; font-size: 18px; line-height: 1; cursor: pointer; display: none; }
#places-input:not(:placeholder-shown) ~ .places-clear { display: block; }
#places-dropdown { position: absolute; top: 42px; left: 0; right: 0; background: #fff; border-radius: 10px;
  box-shadow: 0 2px 10px rgba(0,0,0,.22); overflow: hidden; display: none; }
#places-dropdown.open { display: block; }
.places-row { padding: 8px 12px; cursor: pointer; font-size: 13px; }
.places-row.active, .places-row:hover { background: #f1f5fb; }
.places-row .main { color: #202124; }
.places-row .sec { color: #80868b; font-size: 12px; }
.places-row.empty { color: #80868b; cursor: default; }
#places-error { position: absolute; top: 42px; left: 12px; font-size: 12px; color: #d93025; background: #fff;
  padding: 2px 8px; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,.15); display: none; }
#places-error.show { display: block; }
#map-no-key {
  display: none; position: absolute; inset: 0; background: #e8ecf0;
  align-items: center; justify-content: center; text-align: center; color: #64748b; font-size: 15px;
}

/* Panel */
#panel { flex: 38; min-width: 320px; max-width: 480px; background: #fff; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; }

/* Home / Landing */
#home { flex: 1; overflow-y: auto; padding: 24px; }
#home h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
#home .subtitle { color: #64748b; font-size: 13px; margin-bottom: 20px; }
#import-area {
  border: 2px dashed #cbd5e1; border-radius: 10px; padding: 20px; text-align: center;
  cursor: pointer; margin-bottom: 24px; background: #f8fafc; transition: border-color 0.2s;
}
#import-area:hover { border-color: #4f7bbf; }
#import-area p { color: #64748b; font-size: 13px; margin-top: 6px; }
#file-input { display: none; }
#import-btn-label {
  display: inline-block; padding: 8px 20px; background: #4f7bbf; color: #fff;
  border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer;
}
#import-status { margin-top: 8px; font-size: 12px; color: #64748b; }
.project-list { display: flex; flex-direction: column; gap: 8px; }
.project-item {
  display: flex; align-items: center; gap: 10px; padding: 12px 14px;
  border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; background: #f8fafc;
  transition: border-color 0.15s;
}
.project-item:hover { border-color: #4f7bbf; background: #eef3fb; }
.project-item .proj-name { font-weight: 600; font-size: 14px; }
.project-item .proj-meta { font-size: 12px; color: #64748b; margin-top: 2px; }
.project-item .proj-del {
  margin-left: auto; background: none; border: none; cursor: pointer;
  color: #94a3b8; font-size: 16px; line-height: 1; padding: 4px;
}
.project-item .proj-del:hover { color: #ef4444; }
#home-loading { color: #64748b; font-size: 13px; }

/* Project view */
#project-view { flex: 1; display: flex; flex-direction: column; min-height: 0; }

/* Filter chips */
#filter-bar { display: flex; gap: 6px; padding: 10px 12px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
.filter-chip {
  padding: 4px 12px; border-radius: 20px; border: 1.5px solid #e2e8f0;
  font-size: 12px; cursor: pointer; background: #f8fafc; color: #64748b;
  transition: all 0.15s; font-weight: 500;
}
.filter-chip.active { background: #4f7bbf; border-color: #4f7bbf; color: #fff; }
.filter-chip:hover:not(.active) { border-color: #4f7bbf; color: #4f7bbf; }

/* Back button strip */
#back-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
#btn-back { background: none; border: none; cursor: pointer; color: #4f7bbf; font-size: 13px; font-weight: 500; padding: 0; }
#btn-back:hover { text-decoration: underline; }
#project-name-label { font-size: 13px; font-weight: 600; color: #1a1a2e; }

/* Corridor list */
#corridor-list { flex: 1; overflow-y: auto; padding: 6px 8px 12px; }

/* Corridor row */
.corr-row {
  border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 6px; overflow: hidden;
  transition: border-color 0.15s;
}
.corr-row.selected { border-color: #4f8cff; }
.corr-header {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  cursor: pointer; background: #f8fafc; user-select: none;
}
.corr-row.selected .corr-header { background: #eef3fb; }
.corr-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.corr-info { flex: 1; min-width: 0; }
.corr-code { font-weight: 600; font-size: 13px; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.corr-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
.corr-chevron { color: #94a3b8; font-size: 12px; transition: transform 0.2s; }
.corr-row.open .corr-chevron { transform: rotate(90deg); }

/* Segment cards container */
.corr-body { display: none; border-top: 1px solid #e2e8f0; background: #fff; }
.corr-row.open .corr-body { display: block; }

/* Corridor name editor */
.corr-name-editor { padding: 10px 12px; background: #f8fafc; border-bottom: 1px solid #f0f2f5; display: flex; gap: 6px; align-items: center; }
.corr-name-editor input {
  flex: 1; border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 8px;
  font-size: 13px; color: #1a1a2e; outline: none; background: #fff;
}
.corr-name-editor input:focus { border-color: #4f7bbf; }
.corr-name-editor .use-sug {
  padding: 5px 9px; background: #f0f7ff; border: 1px solid #bcd4ff;
  border-radius: 6px; font-size: 11px; color: #3b5ea8; cursor: pointer; white-space: nowrap;
}
.corr-name-editor .use-sug:hover { background: #dbeafe; }

/* Segment cards */
.seg-cards { padding: 6px 8px; }
.seg-card {
  border: 1px solid #e2e8f0; border-radius: 7px; padding: 10px 11px;
  margin-bottom: 6px; background: #fff; transition: border-color 0.15s;
}
.seg-card:last-child { margin-bottom: 0; }
.seg-card.focused { border-color: #4f8cff; }
.seg-card.seg-hovered { border-color: #94a3b8; }
.seg-card.seg-focused { box-shadow: inset 3px 0 0 #4f8cff; }
.seg-card.named.seg-focused { box-shadow: inset 3px 0 0 #54c08a; }
/* input + clear (×) button */
.input-wrap { position: relative; margin-bottom: 7px; }
.input-wrap .seg-name-input, .input-wrap .corr-name-input { margin-bottom: 0; padding-right: 30px; }
.clear-input {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  width: 19px; height: 19px; border: none; border-radius: 50%;
  background: #e2e8f0; color: #64748b; cursor: pointer; padding: 0;
  display: none; align-items: center; justify-content: center;
  font-size: 14px; line-height: 1;
}
/* Show the × whenever the field is non-empty — works for typing, chips, and
   "use suggestion" alike (the input shows its placeholder only when empty). */
.input-wrap input:not(:placeholder-shown) + .clear-input { display: flex; }
.clear-input:hover { background: #cbd5e1; color: #1e293b; }
.seg-ref { font-size: 11px; color: #94a3b8; margin-bottom: 6px; display: flex; align-items: center; }
.seg-len { margin-left: auto; padding-left: 8px; color: #94a3b8; font-variant-numeric: tabular-nums; }
.seg-badge { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; background: #0e1320; color: #fff; font-size: 11px; font-weight: 700; margin-right: 6px; flex-shrink: 0; vertical-align: middle; }
.seg-name-input {
  width: 100%; border: 1px solid #e2e8f0; border-radius: 6px; padding: 7px 9px;
  font-size: 13px; color: #1a1a2e; outline: none; background: #fff; margin-bottom: 7px;
}
.seg-name-input:focus { border-color: #4f7bbf; box-shadow: 0 0 0 2px #dbeafe; }
.seg-name-input.named { border-color: #54c08a; background: #f0fdf4; }
.seg-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip-sug {
  padding: 3px 10px; border-radius: 20px; border: 1.5px solid #bcd4ff;
  background: #eef3fb; color: #3b5ea8; font-size: 11px; cursor: pointer; font-weight: 500;
}
.chip-sug:hover { background: #dbeafe; border-color: #4f7bbf; }
.chip-twin {
  padding: 3px 10px; border-radius: 20px; border: 1.5px solid #d4c5f9;
  background: #f5f3ff; color: #6d3fbf; font-size: 11px; cursor: pointer; font-weight: 500;
}
.chip-twin:hover { background: #ede9fe; }

/* Tooltip */
#map-tooltip {
  position: fixed; pointer-events: none; z-index: 9999;
  background: rgba(26,26,46,0.92); color: #fff; border-radius: 6px;
  padding: 5px 10px; font-size: 12px; display: none; white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

/* Saving indicator */
#save-indicator {
  position: fixed; bottom: 16px; right: 16px; z-index: 9999;
  background: #54c08a; color: #fff; border-radius: 20px;
  padding: 6px 16px; font-size: 12px; font-weight: 500;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
#save-indicator.visible { opacity: 1; }

/* No-key overlay */
.no-maps-msg {
  background: #fff8e1; border: 1px solid #f59e0b; border-radius: 8px;
  padding: 16px; color: #92400e; font-size: 13px; margin: 20px;
}

/* Misc */
.empty-state { padding: 32px 16px; text-align: center; color: #94a3b8; font-size: 13px; }
.loading { padding: 16px; text-align: center; color: #94a3b8; font-size: 13px; }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <h1>Road Namer</h1>
    <div id="header-progress" style="display:none">
      <span id="progress-label">Named 0 / 0</span>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    </div>
    <div style="flex:1"></div>
    <button id="btn-next-unnamed" style="display:none">Next unnamed →</button>
    <button id="btn-merge" style="display:none">Merge</button>
    <button id="btn-export" disabled>Export</button>
  </div>

  <!-- Body -->
  <div id="body">
    <!-- Map -->
    <div id="map-container">
      <div id="map"></div>
      <div id="map-no-key"><div class="no-maps-msg">No Google Maps API key configured.<br>Set <code>GOOGLE_MAPS_JS_KEY</code> in your environment and restart the server.</div></div>
      <div id="places-search">
        <span class="places-icon">⌕</span>
        <input id="places-input" type="text" placeholder="Search place or lat, lng" autocomplete="off" spellcheck="false"/>
        <button class="places-clear" tabindex="-1" title="Clear">×</button>
        <div id="places-error"></div>
        <div id="places-dropdown"></div>
      </div>
    </div>

    <!-- Panel -->
    <div id="panel">
      <!-- Home view -->
      <div id="home">
        <h2>Road Namer</h2>
        <p class="subtitle">Select a project to start naming road segments.</p>

        <!-- Import is hidden from end users; projects are provisioned by an admin (POST /api/projects). -->
        <div id="import-area" style="display:none" onclick="document.getElementById('file-input').click()">
          <label id="import-btn-label">+ Import GeoJSON</label>
          <p>Click to choose a .geojson file, or drag and drop</p>
          <div id="import-status"></div>
        </div>
        <input type="file" id="file-input" accept=".geojson,.json"/>

        <div id="home-loading">Loading projects…</div>
        <div class="project-list" id="project-list"></div>
      </div>

      <!-- Project view -->
      <div id="project-view" style="display:none">
        <div id="back-bar">
          <button id="btn-back">← Projects</button>
          <span id="project-name-label"></span>
        </div>
        <div id="filter-bar">
          <div class="filter-chip active" data-filter="all">All <span id="count-all">0</span></div>
          <div class="filter-chip" data-filter="unnamed">Unnamed <span id="count-unnamed">0</span></div>
          <div class="filter-chip" data-filter="named">Named <span id="count-named">0</span></div>
        </div>
        <div id="search-bar" style="padding:8px 12px;border-bottom:1px solid #e2e8f0;">
          <div class="input-wrap" style="margin-bottom:0">
            <input id="panel-search" type="text" placeholder="Search saved names…" autocomplete="off"
                   style="width:100%;box-sizing:border-box;border:1px solid #e2e8f0;border-radius:6px;padding:6px 30px 6px 9px;font-size:13px;outline:none;"/>
            <button class="clear-input" id="panel-search-clear" title="Clear" tabindex="-1">×</button>
          </div>
        </div>
        <div id="corridor-list"></div>
      </div>
    </div>
  </div>
</div>

<div id="map-tooltip"></div>
<div id="merge-chooser"></div>
<div id="hint-toast"></div>
<div id="app-modal-overlay"><div id="app-modal"></div></div>
<div id="save-indicator">Saved ✓</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   ROAD NAMER — single-file vanilla JS + Google Maps
   ═══════════════════════════════════════════════════════════════════ */

// ── State ──────────────────────────────────────────────────────────
let googleMap = null;
let MAPS_KEY = '';               // captured at config load; used as X-Goog-Api-Key for Places REST
let projectData = null;          // full project response {project, corridors, segments}

function previewColor(i) { return PREVIEW_COLORS[i % PREVIEW_COLORS.length]; }

// ── Helpers ────────────────────────────────────────────────────────
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function lngLatToGM(coords) {
  // coords = [[lng, lat], ...] → [{lat, lng}, ...]
  return coords.map(([lng, lat]) => ({ lat, lng }));
}

function midpointGM(coords) {
  // Return the middle point of a coords array (lng,lat order) as {lat,lng}
  const mid = Math.floor(coords.length / 2);
  return { lat: coords[mid][1], lng: coords[mid][0] };
}

function headingDeg(a, b) {
  // bearing a→b ({lat,lng}) in degrees, 0=N clockwise
  const toRad = d => d * Math.PI / 180, toDeg = r => r * 180 / Math.PI;
  const dLng = toRad(b.lng - a.lng);
  const y = Math.sin(dLng) * Math.cos(toRad(b.lat));
  const x = Math.cos(toRad(a.lat)) * Math.sin(toRad(b.lat)) -
            Math.sin(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.cos(dLng);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function segLengthM(coords) {
  // total length in metres of a [[lng,lat],...] line (haversine)
  const R = 6371000, toRad = d => d * Math.PI / 180;
  let m = 0;
  for (let i = 1; i < coords.length; i++) {
    const [lng1, lat1] = coords[i - 1], [lng2, lat2] = coords[i];
    const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
    const h = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
    m += 2 * R * Math.asin(Math.min(1, Math.sqrt(h)));
  }
  return m;
}

function itemLengthM(item) {
  return segmentsOfItem(item).reduce((s, seg) => s + segLengthM(seg.coords), 0);
}

function fmtLen(m) {
  return m < 1000 ? `${Math.round(m)} m` : `${(m / 1000).toFixed(2)} km`;
}

function showSaveIndicator() {
  const el = document.getElementById('save-indicator');
  el.classList.add('visible');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('visible'), 1800);
}

// ── API ────────────────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const r = await fetch(path, opts);
  if (!r.ok) {
    let msg;
    try { msg = (await r.json()).detail || r.statusText; } catch(e) { msg = r.statusText; }
    throw new Error(msg);
  }
  const ct = r.headers.get('content-type') || '';
  return ct.includes('json') ? r.json() : r;
}

async function apiPatch(path, body) {
  return apiFetch(path, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
}

// ── Progress helpers ───────────────────────────────────────────────
function calcProgress() {
  if (!projectData) return { named: 0, total: 0 };
  const segs = projectData.segments;
  const named = segs.filter(s => s.named).length;
  return { named, total: segs.length };
}

function updateProgressUI() {
  const { named, total } = calcProgress();
  document.getElementById('progress-label').textContent = `Named ${named} / ${total}`;
  document.getElementById('progress-bar').style.width = total ? `${Math.round(named / total * 100)}%` : '0%';
  updateFilterCounts();
}

function updateFilterCounts() {
  if (!projectData) return;
  const segs = projectData.segments;
  const all = segs.length;
  const named = segs.filter(s => s.named).length;
  const unnamed = all - named;

  // Count by unified items (corridors + standalone)
  const visibleItems = getVisibleCorridors();
  let countAll = 0, countNamed = 0, countUnnamed = 0;
  visibleItems.forEach(item => {
    const segsOfItem = segmentsOfItem(item);
    countAll++;
    const allNamed = segsOfItem.length > 0 && segsOfItem.every(s => s.named);
    if (allNamed) countNamed++;
    else countUnnamed++;
  });

  document.getElementById('count-all').textContent = countAll;
  document.getElementById('count-named').textContent = countNamed;
  document.getElementById('count-unnamed').textContent = countUnnamed;
}

// ── Data helpers ───────────────────────────────────────────────────

// Build synthetic standalone items from segments with corridor_id === null.
// Each becomes a single-segment item with id 'sa_<seg.id>' and isStandalone:true.
function getStandaloneItems() {
  if (!projectData) return [];
  return projectData.segments
    .filter(s => s.corridor_id === null)
    .map(s => ({
      id: 'sa_' + s.id,
      isStandalone: true,
      _segId: s.id,
      cor_code: null,
      name: null,
      suggested: null
    }));
}

// Returns the unified list: real corridors first, then one item per standalone segment.
function getVisibleCorridors() {
  if (!projectData) return [];
  return [...projectData.corridors, ...getStandaloneItems()];
}

// Return segments belonging to an item (corridor or standalone).
function segmentsOfItem(item) {
  if (!projectData) return [];
  if (item.isStandalone) {
    const seg = projectData.segments.find(s => s.id === item._segId);
    return seg ? [seg] : [];
  }
  return projectData.segments
    .filter(s => s.corridor_id === item.id)
    .sort((a, b) => a.seq - b.seq);
}

// Legacy alias used internally (accepts a real corridor db id or 'sa_' synthetic id).
function segmentsOfCorridor(corrId) {
  if (!projectData) return [];
  if (typeof corrId === 'string' && corrId.startsWith('sa_')) {
    const segId = parseInt(corrId.slice(3), 10);
    const seg = projectData.segments.find(s => s.id === segId);
    return seg ? [seg] : [];
  }
  return projectData.segments
    .filter(s => s.corridor_id === corrId)
    .sort((a, b) => a.seq - b.seq);
}

function corridorIsNamed(corrId) {
  const segs = segmentsOfCorridor(corrId);
  return segs.length > 0 && segs.every(s => s.named);
}

function corridorUnnamedCount(corrId) {
  return segmentsOfCorridor(corrId).filter(s => !s.named).length;
}

function getCorrObj(corrId) {
  return projectData && projectData.corridors.find(c => c.id === corrId);
}

function joinCorrCoords(corrId) {
  // Join segments head-to-tail into one polyline path
  const segs = segmentsOfCorridor(corrId);
  if (!segs.length) return [];
  const pts = [];
  segs.forEach(s => s.coords.forEach(c => pts.push({ lat: c[1], lng: c[0] })));
  return pts;
}

function corrDisplayName(corr) {
  if (corr.isStandalone) {
    if (!projectData) return 'standalone';
    const seg = projectData.segments.find(s => s.id === corr._segId);
    return (seg && (seg.name || seg.route_name_imported || seg.sug_geocode || seg.sug_roads)) || 'standalone';
  }
  return corr.name || corr.suggested || corr.cor_code || `Corridor ${corr.id}`;
}

function corrSuggestion(corr) {
  if (corr.isStandalone) return null;
  if (corr.suggested) return corr.suggested;
  // Fall back to most common child name
  const names = segmentsOfCorridor(corr.id).map(s => s.name).filter(Boolean);
  if (!names.length) return null;
  const freq = {};
  names.forEach(n => freq[n] = (freq[n] || 0) + 1);
  return Object.entries(freq).sort((a,b) => b[1]-a[1])[0][0];
}

// ── Filter visibility ──────────────────────────────────────────────
function itemMatchesFilter(item) {
  if (activeFilter === 'all') return true;
  const segs = segmentsOfItem(item);
  const allNamed = segs.length > 0 && segs.every(s => s.named);
  if (activeFilter === 'named') return allNamed;
  if (activeFilter === 'unnamed') return !allNamed;
  return true;
}

// Search matches saved names only (corridor name or any child segment name).
function itemMatchesSearch(item) {
  const q = searchQuery.trim().toLowerCase();
  if (!q) return true;
  if (!item.isStandalone && (item.name || '').toLowerCase().includes(q)) return true;
  return segmentsOfItem(item).some(s => (s.name || '').toLowerCase().includes(q));
}

// ── Colors ────────────────────────────────────────────────────────
const COLOR_UNNAMED  = '#4f7bbf';
const COLOR_NAMED    = '#54c08a';
const COLOR_SELECTED = '#4f8cff';
const COLOR_FADED    = '#b0c4de';

function corrColor(corrId) {
  if (corrId === selectedCorrId) return COLOR_SELECTED;
  const named = corridorIsNamed(corrId);
  return named ? COLOR_NAMED : COLOR_UNNAMED;
}

// ── Map rendering ──────────────────────────────────────────────────
function renderMap() {
  if (!googleMap || !projectData) return;
  clearChildPolylines();

  // Remove old top-level polylines
  Object.values(corridorPolylines).forEach(pl => pl.setMap(null));
  corridorPolylines = {};

  getVisibleCorridors().forEach(corr => {
    const path = joinCorrCoords(corr.id);
    if (!path.length) return;

    const isSelected = corr.id === selectedCorrId;
    const color = corrColor(corr.id);
    const opacity = (selectedCorrId && !isSelected) ? 0.3 : 1;

    const pl = new google.maps.Polyline({
      path,
      map: googleMap,
      strokeColor: color,
      strokeWeight: 7,
      strokeOpacity: opacity,
      zIndex: isSelected ? 0 : 1
    });

    corridorPolylines[corr.id] = pl;

    // Click
    pl.addListener('click', () => selectCorridor(corr.id, 'map'));

    // Hover tooltip
    pl.addListener('mouseover', (e) => {
      const segs = segmentsOfItem(corr);
      const unnamedCount = segs.filter(s => !s.named).length;
      const label = corrDisplayName(corr);
      const tooltip = document.getElementById('map-tooltip');
      tooltip.textContent = `${label} · ${segs.length} seg${segs.length !== 1 ? 's' : ''} · ${unnamedCount} unnamed`;
      tooltip.style.display = 'block';
    });
    pl.addListener('mousemove', (e) => {
      const tooltip = document.getElementById('map-tooltip');
      const mouseEvent = e.domEvent || (e.xa && e);
      if (mouseEvent && mouseEvent.clientX !== undefined) {
        tooltip.style.left = (mouseEvent.clientX + 14) + 'px';
        tooltip.style.top  = (mouseEvent.clientY - 10) + 'px';
      }
    });
    pl.addListener('mouseout', () => {
      document.getElementById('map-tooltip').style.display = 'none';
    });
  });

  // Draw child segments for selected corridor
  if (selectedCorrId) {
    drawChildSegments(selectedCorrId);
  }
}

function drawChildSegments(corrId) {
  clearChildPolylines();
  const segs = segmentsOfCorridor(corrId);

  segs.forEach((seg, idx) => {
    const path = lngLatToGM(seg.coords);
    if (!path.length) return;

    // Color by status only (no alternating shades)
    const segColor = seg.named ? COLOR_NAMED : COLOR_UNNAMED;

    // White halo casing — hidden until the segment is hovered or selected
    const casing = new google.maps.Polyline({
      path,
      map: null,
      strokeColor: '#ffffff',
      strokeWeight: 14,
      strokeOpacity: 0.95,
      zIndex: 1,
      clickable: false
    });

    // Core polyline (status color, no chevrons)
    const core = new google.maps.Polyline({
      path,
      map: googleMap,
      strokeColor: segColor,
      strokeWeight: 7,
      strokeOpacity: 1,
      zIndex: 1
    });

    segPolylines[seg.id] = { core, casing, nodes: [] };

    core.addListener('mouseover', () => setSegHover(seg.id, true));
    core.addListener('mouseout', () => setSegHover(seg.id, false));
    core.addListener('click', () => {
      focusSegmentCard(seg.id);
      setSegFocus(seg.id);
    });

    childPolylines.push(core, casing);

    // Direction markers: a circle at the corridor ORIGIN (first segment's start) and an
    // arrow at every segment END pointing in the travel direction. Created off-map and
    // shown only when zoomed in (see updateDirMarkers) — i.e. on close inspection/selection.
    if (path.length >= 2) {
      const markers = [];
      if (idx === 0) {
        markers.push(new google.maps.Marker({
          position: path[0], icon: {
            path: google.maps.SymbolPath.CIRCLE, scale: 4,
            fillColor: segColor, fillOpacity: 1, strokeColor: '#fff', strokeWeight: 1.5
          }, zIndex: 6, clickable: false
        }));
      }
      const a = path[path.length - 2], b = path[path.length - 1];
      markers.push(new google.maps.Marker({
        position: b, icon: {
          path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 3.5,
          rotation: headingDeg(a, b), fillColor: segColor, fillOpacity: 1,
          strokeColor: '#fff', strokeWeight: 1
        }, zIndex: 6, clickable: false
      }));
      segPolylines[seg.id].nodes = markers;
      markers.forEach(m => { childPolylines.push(m); dirMarkers.push(m); });
    }

    // Numbered badge marker at midpoint
    const mid = midpointGM(seg.coords);
    const badge = new google.maps.Marker({
      position: mid,
      map: googleMap,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 11,
        fillColor: '#0e1320',
        fillOpacity: 1,
        strokeColor: '#ffffff',
        strokeWeight: 1.5
      },
      label: { text: String(idx + 1), color: '#ffffff', fontSize: '11px', fontWeight: '700' },
      zIndex: 50,
      clickable: false
    });
    childPolylines.push(badge);
  });

  refreshSegStyles();
  updateDirMarkers();
}

// Recompute every child segment's style from current hover/focus state.
// The core line ALWAYS keeps its status color (blue/green) at full opacity — hover/
// select only ADD a border (the casing halo) and bring the segment to front. No dimming,
// no colour or weight change to the line. Border: white for hover, dark for selected.
// Layer: hovered > selected > normal.
function refreshSegStyles() {
  Object.keys(segPolylines).forEach(id => {
    const sid = Number(id);
    const { core, casing } = segPolylines[sid];
    const isFocus = sid === focusedSegId;
    const isHover = sid === hoveredSegId;
    const emph = isFocus || isHover;
    // Core: never touch colour or opacity — only stacking order.
    core.setOptions({ zIndex: isHover ? 41 : (isFocus ? 21 : 1) });
    if (emph) {
      casing.setOptions({
        strokeColor: isHover ? '#ffffff' : '#1e293b',
        strokeWeight: 12,
        strokeOpacity: 1,
        zIndex: isHover ? 40 : 20
      });
      casing.setMap(googleMap);
    } else {
      casing.setMap(null);
    }
    const card = document.getElementById(`seg-card-${sid}`);
    if (card) {
      card.classList.toggle('seg-hovered', isHover);
      card.classList.toggle('seg-focused', isFocus);
    }
  });
}

function setSegHover(segId, on) {
  hoveredSegId = on ? segId : (hoveredSegId === segId ? null : hoveredSegId);
  refreshSegStyles();
}

function setSegFocus(segId) {
  focusedSegId = segId;
  refreshSegStyles();
}

function clearChildPolylines() {
  childPolylines.forEach(p => p.setMap(null));
  childPolylines = [];
  dirMarkers = [];
  segPolylines = {};
  hoveredSegId = null;
  focusedSegId = null;
}

// Direction markers (origin circle + arrows) only show when zoomed in past DIR_ZOOM.
function updateDirMarkers() {
  const show = !!googleMap && googleMap.getZoom() >= DIR_ZOOM;
  dirMarkers.forEach(m => m.setMap(show ? googleMap : null));
}

function fitMapToCorridors() {
  if (!googleMap || !projectData) return;
  const bounds = new google.maps.LatLngBounds();
  let hasPoints = false;
  projectData.segments.forEach(seg => {
    seg.coords.forEach(([lng, lat]) => {
      bounds.extend({ lat, lng });
      hasPoints = true;
    });
  });
  if (hasPoints) googleMap.fitBounds(bounds);
}

function fitMapToCorridor(corrId) {
  if (!googleMap) return;
  const segs = segmentsOfCorridor(corrId);
  if (!segs.length) return;
  const bounds = new google.maps.LatLngBounds();
  segs.forEach(seg => seg.coords.forEach(([lng, lat]) => bounds.extend({ lat, lng })));
  googleMap.fitBounds(bounds, { top: 50, right: 50, bottom: 50, left: 50 });
}

// ── Map click on empty space ───────────────────────────────────────
function initMapClickDeselect() {
  if (!googleMap) return;
  googleMap.addListener('click', () => {
    if (mergeMode) return;
    deselectCorridor();
  });
  googleMap.addListener('zoom_changed', updateDirMarkers);
}

// ── Places search (new Places API, browser REST) ───────────────────
const PLACES_BASE = 'https://places.googleapis.com/v1';
let searchMarker = null;
let placesSessionToken = null;
let acResults = [];   // current autocomplete predictions
let acIndex = -1;     // highlighted dropdown row
let placesDebounce = null;

function newSessionToken() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function looksLikeCoords(s) {
  const parts = (s || '').trim().split(/[,\s]+/).filter(Boolean);
  return parts.length === 2 && !isNaN(parseFloat(parts[0])) && !isNaN(parseFloat(parts[1]));
}

function parseCoords(s) {
  const parts = (s || '').trim().split(/[,\s]+/).filter(Boolean);
  if (parts.length < 2) return { error: 'Enter both lat and lng' };
  if (parts.length > 2) return { error: 'Use: lat, lng' };
  const lat = parseFloat(parts[0]), lng = parseFloat(parts[1]);
  if (isNaN(lat) || isNaN(lng)) return { error: 'Invalid numbers' };
  if (Math.abs(lat) > 90) return { error: 'Latitude must be -90..90' };
  if (Math.abs(lng) > 180) return { error: 'Longitude must be -180..180' };
  return { lat, lng };
}

async function placesAutocomplete(input) {
  const c = googleMap.getCenter();
  const res = await fetch(`${PLACES_BASE}/places:autocomplete`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Goog-Api-Key': MAPS_KEY,
      'X-Goog-FieldMask': 'suggestions.placePrediction.placeId,suggestions.placePrediction.text,suggestions.placePrediction.structuredFormat'
    },
    body: JSON.stringify({
      input, sessionToken: placesSessionToken,
      locationBias: { circle: { center: { latitude: c.lat(), longitude: c.lng() }, radius: 50000 } }
    })
  });
  if (!res.ok) throw new Error('autocomplete ' + res.status);
  const j = await res.json();
  return (j.suggestions || []).map(s => s.placePrediction).filter(Boolean);
}

async function placeLocation(placeId) {
  const res = await fetch(
    `${PLACES_BASE}/places/${encodeURIComponent(placeId)}?sessionToken=${encodeURIComponent(placesSessionToken || '')}`,
    { headers: { 'X-Goog-Api-Key': MAPS_KEY, 'X-Goog-FieldMask': 'location' } });
  if (!res.ok) throw new Error('details ' + res.status);
  return (await res.json()).location;
}

function showSearchMarker(lat, lng) {
  if (searchMarker) searchMarker.setMap(null);
  searchMarker = new google.maps.Marker({ position: { lat, lng }, map: googleMap, zIndex: 9999 });
  googleMap.panTo({ lat, lng });
  if ((googleMap.getZoom() || 0) < 14) googleMap.setZoom(16);
}

function closeDropdown() {
  const dd = document.getElementById('places-dropdown');
  dd.classList.remove('open'); dd.innerHTML = '';
}

function showCoordError(msg) {
  const e = document.getElementById('places-error');
  if (msg) { e.textContent = msg; e.classList.add('show'); } else { e.classList.remove('show'); }
}

function clearSearch() {
  const inp = document.getElementById('places-input');
  inp.value = '';
  closeDropdown();
  showCoordError('');
  if (searchMarker) { searchMarker.setMap(null); searchMarker = null; }
  placesSessionToken = null;
}

function renderDropdown() {
  const dd = document.getElementById('places-dropdown');
  if (!acResults.length) {
    dd.innerHTML = '<div class="places-row empty">No matches</div>'; dd.classList.add('open'); return;
  }
  dd.innerHTML = acResults.map((p, i) => {
    const sf = p.structuredFormat || {};
    const main = (sf.mainText && sf.mainText.text) || (p.text && p.text.text) || '';
    const sec = (sf.secondaryText && sf.secondaryText.text) || '';
    return `<div class="places-row${i === acIndex ? ' active' : ''}" data-i="${i}">
      <div class="main">${esc(main)}</div>${sec ? `<div class="sec">${esc(sec)}</div>` : ''}</div>`;
  }).join('');
  dd.classList.add('open');
  dd.querySelectorAll('.places-row[data-i]').forEach(row =>
    row.addEventListener('mousedown', e => { e.preventDefault(); selectPrediction(Number(row.dataset.i)); }));
}

async function selectPrediction(i) {
  const p = acResults[i]; if (!p) return;
  const inp = document.getElementById('places-input');
  inp.value = (p.text && p.text.text) || '';
  closeDropdown();
  try {
    const loc = await placeLocation(p.placeId);
    if (loc) showSearchMarker(loc.latitude, loc.longitude);
  } catch (err) { console.error('[places] details', err); showCoordError("Couldn't load that place"); }
  placesSessionToken = null; // session ends on selection
}

async function runAutocomplete(value) {
  if (!placesSessionToken) placesSessionToken = newSessionToken();
  try {
    acResults = await placesAutocomplete(value);
    acIndex = -1;
    renderDropdown();
  } catch (err) {
    console.error('[places] autocomplete', err);
    acResults = []; closeDropdown();
    if (String(err.message).includes('403')) {
      const dd = document.getElementById('places-dropdown');
      dd.innerHTML = '<div class="places-row empty">Search unavailable</div>'; dd.classList.add('open');
    }
  }
}

function onPlacesInput(value) {
  clearTimeout(placesDebounce);
  showCoordError('');
  if (!value.trim()) { closeDropdown(); if (searchMarker) { searchMarker.setMap(null); searchMarker = null; } return; }
  if (looksLikeCoords(value)) { closeDropdown(); return; }   // coordinate mode: wait for Enter
  if (value.trim().length < 3) { closeDropdown(); return; }
  placesDebounce = setTimeout(() => runAutocomplete(value.trim()), 300);
}

function onPlacesKeydown(e) {
  const inp = e.target;
  if (e.key === 'Escape') { clearSearch(); inp.blur(); return; }
  if (looksLikeCoords(inp.value)) {
    if (e.key === 'Enter') {
      const r = parseCoords(inp.value);
      if (r.error) { showCoordError(r.error); }
      else { showCoordError(''); showSearchMarker(r.lat, r.lng); closeDropdown(); }
    }
    return;
  }
  if (e.key === 'ArrowDown') { e.preventDefault(); if (acResults.length) { acIndex = Math.min(acIndex + 1, acResults.length - 1); renderDropdown(); } }
  else if (e.key === 'ArrowUp') { e.preventDefault(); if (acResults.length) { acIndex = Math.max(acIndex - 1, -1); renderDropdown(); } }
  else if (e.key === 'Enter') { e.preventDefault(); if (acResults.length) selectPrediction(acIndex >= 0 ? acIndex : 0); }
}

function initPlacesSearch() {
  const inp = document.getElementById('places-input');
  if (!inp) return;
  inp.addEventListener('input', () => onPlacesInput(inp.value));
  inp.addEventListener('keydown', onPlacesKeydown);
  document.querySelector('#places-search .places-clear')
    .addEventListener('click', () => { clearSearch(); inp.focus(); });
  document.addEventListener('click', e => { if (!e.target.closest('#places-search')) closeDropdown(); });
}

// ── Tooltip mousemove on document ──────────────────────────────────
document.addEventListener('mousemove', e => {
  const tooltip = document.getElementById('map-tooltip');
  if (tooltip.style.display === 'block') {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
  }
});

// ── Selection ──────────────────────────────────────────────────────
function selectCorridor(corrId, source) {
  if (previewRootId) clearPreviewState();
  selectedCorrId = corrId;

  // Map: re-render with selection
  renderMap();

  // Fit the map to the corridor/standalone from ANY selection source (map, panel, next-unnamed)
  fitMapToCorridor(corrId);

  // Panel: open accordion
  openAccordion(corrId, source !== 'panel');
}

function deselectCorridor() {
  if (previewRootId) clearPreviewState();
  selectedCorrId = null;
  openCorrId = null;
  renderMap();
  renderCorrList();
}

function openAccordion(corrId, scrollToRow) {
  openCorrId = corrId;
  renderCorrList();
  if (scrollToRow) {
    setTimeout(() => {
      const row = document.getElementById(`corr-row-${corrId}`);
      if (row) row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

function focusSegmentCard(segId) {
  // Scroll the segment card into view and briefly highlight
  const card = document.getElementById(`seg-card-${segId}`);
  if (!card) return;
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  card.classList.add('focused');
  setTimeout(() => card.classList.remove('focused'), 1200);
  // Apply the persistent "selected" state (amber casing on map + seg-focused on card)
  // so focusing from the panel / Next-unnamed matches focusing by clicking the map.
  setSegFocus(segId);
}

// ── Panel rendering ────────────────────────────────────────────────
function renderCorrList() {
  const container = document.getElementById('corridor-list');
  if (!projectData) { container.innerHTML = ''; return; }

  const corrs = getVisibleCorridors().filter(c => itemMatchesFilter(c) && itemMatchesSearch(c));

  if (!corrs.length) {
    container.innerHTML = '<div class="empty-state">No corridors match this filter.</div>';
    return;
  }

  container.innerHTML = '';
  corrs.forEach(corr => {
    const isOpen = corr.id === openCorrId || (!!searchQuery.trim() && !corr.isStandalone);
    const isSelected = corr.id === selectedCorrId;
    const segs = segmentsOfItem(corr);
    const unnamedCount = segs.filter(s => !s.named).length;
    const named = segs.length > 0 && segs.every(s => s.named);
    const dotColor = named ? COLOR_NAMED : COLOR_UNNAMED;
    const label = corrDisplayName(corr);
    const isStandalone = !!corr.isStandalone;

    const row = document.createElement('div');
    row.className = `corr-row${isOpen ? ' open' : ''}${isSelected ? ' selected' : ''}`;
    row.id = `corr-row-${corr.id}`;

    row.innerHTML = `
      <div class="corr-header">
        <div class="corr-dot" style="background:${dotColor}"></div>
        <div class="corr-info">
          <div class="corr-code">${esc(isStandalone ? label : (corr.name || corr.cor_code || label))}${
            isStandalone
              ? ' <em style="font-style:normal;font-weight:400;color:#94a3b8;font-size:11px">standalone</em>'
              : (corr.name ? ` <em style="font-style:normal;font-weight:400;color:#94a3b8;font-size:11px">${esc(corr.cor_code)}</em>` : '')
          }</div>
          <div class="corr-meta">${segs.length} seg${segs.length !== 1 ? 's' : ''} · ${unnamedCount} unnamed · ${fmtLen(itemLengthM(corr))}</div>
        </div>
        <span class="corr-chevron">▶</span>
      </div>
      <div class="corr-body">
        ${buildCorrBody(corr, segs)}
      </div>
    `;

    // Header click: accordion toggle + selection
    row.querySelector('.corr-header').addEventListener('click', () => {
      if (openCorrId === corr.id) {
        // Already open: deselect
        deselectCorridor();
      } else {
        selectCorridor(corr.id, 'panel');
      }
    });

    // Wire up corridor name editor (real corridors only)
    if (!isStandalone) {
      const nameInput = row.querySelector('.corr-name-input');
      if (nameInput) {
        nameInput.addEventListener('change', () => saveCorrName(corr.id, nameInput.value));
        nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') { nameInput.blur(); } });
        const corrClear = row.querySelector('.corr-name-editor .clear-input');
        if (corrClear) {
          corrClear.addEventListener('mousedown', e => e.preventDefault());
          corrClear.addEventListener('click', () => {
            nameInput.value = '';
            saveCorrName(corr.id, '');
            nameInput.focus();
          });
        }
      }
      const useSugBtn = row.querySelector('.use-sug:not(.quick-merge-btn)');
      if (useSugBtn) {
        useSugBtn.addEventListener('click', () => {
          const sug = corrSuggestion(corr);
          if (sug && nameInput) {
            nameInput.value = sug;
            saveCorrName(corr.id, sug);
          }
        });
      }
      const quickBtn = row.querySelector('.quick-merge-btn');
      if (quickBtn) quickBtn.addEventListener('click', (e) => { e.stopPropagation(); openQuickMergeModal(corr); });
    }

    // Wire up segment cards
    segs.forEach(seg => {
      wireSegCard(row, seg, corr.id);
    });

    container.appendChild(row);
  });
}

function buildCorrBody(corr, segs) {
  if (corr.isStandalone) {
    // Standalone: no corridor name editor, just the single segment card
    return `
      <div class="seg-cards">
        ${segs.map((seg, idx) => buildSegCard(seg, idx)).join('')}
      </div>
    `;
  }
  const sug = corrSuggestion(corr);
  const corrNameVal = corr.name || '';
  const quick = corridorChainable(corr)
    ? `<button class="use-sug quick-merge-btn" title="Merge whole corridor into one segment">⤳ Quick-merge</button>` : '';
  return `
    <div class="corr-name-editor">
      <div class="input-wrap" style="flex:1">
        <input class="corr-name-input" type="text" value="${esc(corrNameVal)}" placeholder="Corridor name…"/>
        <button class="clear-input" title="Clear" tabindex="-1">×</button>
      </div>
      ${sug ? `<button class="use-sug" title="${esc(sug)}">Use: ${esc(sug.length > 20 ? sug.slice(0,20) + '…' : sug)}</button>` : ''}
      ${quick}
    </div>
    <div class="seg-cards">
      ${segs.map((seg, idx) => buildSegCard(seg, idx)).join('')}
    </div>
  `;
}

function buildSegCard(seg, idx) {
  const named = seg.named;
  // Suggestion chips
  const chips = buildChips(seg);
  const badgeNum = (typeof idx === 'number') ? idx + 1 : '';
  const badgeHtml = badgeNum ? `<span class="seg-badge">${badgeNum}</span>` : '';
  const mergedTag = seg.is_merged ? `<span class="merged-tag">merged (${seg.merged_from.length})</span>` : '';
  const unmergeBtn = seg.is_merged ? `<button class="unmerge-btn" data-seg-id="${seg.id}">Unmerge</button>` : '';
  const previewBtn = seg.is_merged ? `<button class="preview-btn" data-seg-id="${seg.id}">${previewRootId === seg.id ? 'Hide parts' : 'Preview parts'}</button>` : '';
  const previewBlock = (previewRootId === seg.id) ? buildPreviewBlock() : '';
  return `
    <div class="seg-card${named ? ' named' : ''}" id="seg-card-${seg.id}">
      <div class="seg-ref">${badgeHtml}${esc(seg.route_name_imported || '')}${mergedTag}<span class="seg-len">${fmtLen(segLengthM(seg.coords))}</span></div>
      <div class="input-wrap">
        <input
          class="seg-name-input${named ? ' named' : ''}"
          id="seg-input-${seg.id}"
          type="text"
          value="${esc(seg.name || '')}"
          placeholder="Enter road name…"
          data-seg-id="${seg.id}"
        />
        <button class="clear-input" title="Clear" tabindex="-1">×</button>
      </div>
      <div class="seg-chips">${chips}</div>
      ${unmergeBtn}${previewBtn}
      ${previewBlock}
    </div>
  `;
}

function buildPreviewBlock() {
  const crumbs = previewStack.map((c, i) =>
    `<span class="crumb" data-crumb="${i}">${esc(c.label)}</span>`).join(' › ');
  const rows = previewParts.map((p, i) => {
    const nm = p.name || p.route_name_imported || ('Segment ' + p.id);
    const tag = p.is_merged ? ` <span class="merged-tag">merged (${p.merged_count})</span>` : '';
    const len = fmtLen(segLengthM(p.coords));
    return `<div class="preview-part${p.is_merged ? ' pv-merged' : ''}" data-part-id="${p.id}">
      <span class="pv-num" style="background:${previewColor(i)}">${i + 1}</span>
      <span class="pv-name">${esc(nm)}${tag}</span>
      <span class="pv-len">${len}</span></div>`;
  }).join('');
  return `<div class="preview-block">
    <div class="preview-crumbs">Parts: ${crumbs}</div>
    ${rows}
    <button class="preview-close">Close preview</button>
  </div>`;
}

function buildChips(seg) {
  const chips = [];
  const geo = seg.sug_geocode;
  const roads = seg.sug_roads;
  const twin = seg.twin_name;

  if (geo && roads && geo === roads) {
    chips.push(`<span class="chip-sug" data-fill="${esc(geo)}" data-seg-id="${seg.id}">${esc(geo)}</span>`);
  } else {
    if (geo) chips.push(`<span class="chip-sug" data-fill="${esc(geo)}" data-seg-id="${seg.id}">${esc(geo)}</span>`);
    if (roads) chips.push(`<span class="chip-sug" data-fill="${esc(roads)}" data-seg-id="${seg.id}">${esc(roads)}</span>`);
  }
  if (twin) {
    chips.push(`<span class="chip-twin" data-fill="${esc(twin)}" data-seg-id="${seg.id}">↔ other direction: ${esc(twin)}</span>`);
  }
  return chips.join('');
}

function wireSegCard(rowEl, seg, corrId) {
  const card = rowEl.querySelector(`#seg-card-${seg.id}`);
  if (!card) return;

  const input = card.querySelector(`#seg-input-${seg.id}`);
  if (input) {
    // Debounced save on input
    input.addEventListener('input', () => {
      clearTimeout(saveTimers[seg.id]);
      saveTimers[seg.id] = setTimeout(() => saveSegName(seg.id, input.value), 800);
    });
    // Immediate save on blur
    input.addEventListener('blur', () => {
      clearTimeout(saveTimers[seg.id]);
      saveSegName(seg.id, input.value);
    });
    // Enter → save + next unnamed
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        clearTimeout(saveTimers[seg.id]);
        saveSegName(seg.id, input.value).then(() => jumpToNextUnnamed());
      }
    });
  }

  // Clear (×) button
  const clearBtn = card.querySelector('.clear-input');
  if (clearBtn && input) {
    clearBtn.addEventListener('mousedown', e => e.preventDefault()); // don't blur the input
    clearBtn.addEventListener('click', () => {
      input.value = '';
      clearTimeout(saveTimers[seg.id]);
      saveSegName(seg.id, '');
      input.focus();
    });
  }

  // Chips
  card.querySelectorAll('.chip-sug, .chip-twin').forEach(chip => {
    chip.addEventListener('click', () => {
      const val = chip.dataset.fill;
      const sid = parseInt(chip.dataset.segId, 10);
      const inp = document.getElementById(`seg-input-${sid}`);
      if (inp) inp.value = val;
      clearTimeout(saveTimers[sid]);
      saveSegName(sid, val);
    });
  });

  // Unmerge button (only present on merged segments)
  const unmergeBtn = card.querySelector('.unmerge-btn');
  if (unmergeBtn) unmergeBtn.addEventListener('click', (e) => { e.stopPropagation(); unmergeSegment(seg); });

  // Preview parts button + (when active) the inline block's controls
  const previewBtn = card.querySelector('.preview-btn');
  if (previewBtn) previewBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (previewRootId === seg.id) closePreview(); else enterPreview(seg);
  });
  if (previewRootId === seg.id) {
    card.querySelectorAll('.preview-crumbs .crumb').forEach(cr =>
      cr.addEventListener('click', (e) => { e.stopPropagation(); gotoCrumb(Number(cr.dataset.crumb)); }));
    card.querySelectorAll('.preview-part').forEach(row => {
      const pid = Number(row.dataset.partId);
      row.addEventListener('mouseenter', () => setPreviewHover(pid, true));
      row.addEventListener('mouseleave', () => setPreviewHover(pid, false));
      const part = previewParts.find(p => p.id === pid);
      if (part && part.is_merged) row.addEventListener('click', (e) => { e.stopPropagation(); drillPreview(part); });
    });
    const closeBtn = card.querySelector('.preview-close');
    if (closeBtn) closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closePreview(); });
  }

  // Map↔panel hover sync
  card.addEventListener('mouseenter', () => setSegHover(seg.id, true));
  card.addEventListener('mouseleave', () => setSegHover(seg.id, false));
  // Click the card (or its input/chips) → select this segment, synced to the map
  card.addEventListener('click', () => setSegFocus(seg.id));
}

async function unmergeSegment(seg) {
  const n = (seg.merged_from || []).length;
  showModal({
    title: 'Unmerge segment',
    message: `Unmerge into ${n} segment${n !== 1 ? 's' : ''}?`,
    confirmText: 'Unmerge',
    onConfirm: async () => {
      try {
        await apiFetch(`/api/segments/${seg.id}/unmerge`, { method: 'POST' });
        projectData = await apiFetch(`/api/projects/${currentProjectId}`);
        updateProgressUI(); renderCorrList(); renderMap();
        showSaveIndicator();
      } catch (err) { alert('Unmerge failed: ' + err.message); }
    }
  });
}

// ── Parts preview ──────────────────────────────────────────────────
async function loadPreviewLevel(id) {
  const res = await apiFetch(`/api/segments/${id}/parts`);
  previewParts = res.parts || [];
}

async function enterPreview(seg) {
  if (mergeMode) return;
  previewRootId = seg.id;
  previewStack = [{ id: seg.id, label: seg.name || seg.route_name_imported || ('Segment ' + seg.id) }];
  try { await loadPreviewLevel(seg.id); }
  catch (e) { alert('Preview failed: ' + e.message); clearPreviewState(); return; }
  renderCorrList();
  renderPreviewMap();
  const card = document.getElementById(`seg-card-${seg.id}`);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function drillPreview(part) {
  previewStack.push({ id: part.id, label: part.name || part.route_name_imported || ('Segment ' + part.id) });
  try { await loadPreviewLevel(part.id); } catch (e) { alert('Preview failed: ' + e.message); return; }
  renderCorrList();
  renderPreviewMap();
}

async function gotoCrumb(i) {
  previewStack = previewStack.slice(0, i + 1);
  try { await loadPreviewLevel(previewStack[i].id); } catch (e) { return; }
  renderCorrList();
  renderPreviewMap();
}

function clearPreviewState() {
  previewRootId = null; previewStack = []; previewParts = [];
  Object.values(previewPolylines).forEach(o => Object.values(o).forEach(x => x && x.setMap && x.setMap(null)));
  previewPolylines = {}; previewHoverId = null;
}

function closePreview() {
  clearPreviewState();
  renderMap();
  renderCorrList();
}

function renderPreviewMap() {
  if (!googleMap) return;
  // Dim the corridor overview lines so the parts stand out for context...
  Object.values(corridorPolylines).forEach(pl => pl.setOptions({ strokeOpacity: 0.12 }));
  // ...but fully remove the selected segment's own child line + markers (numbered
  // badge, origin dot, direction arrows). strokeOpacity can't fade markers, so they
  // would otherwise sit under the preview badges and clutter it. The preview overlay
  // replaces them; closePreview() -> renderMap() restores them.
  clearChildPolylines();
  // Clear any prior preview overlay.
  Object.values(previewPolylines).forEach(o => Object.values(o).forEach(x => x && x.setMap && x.setMap(null)));
  previewPolylines = {};
  previewParts.forEach((part, i) => {
    const path = lngLatToGM(part.coords);
    if (path.length < 2) return;
    const color = previewColor(i);
    const casing = new google.maps.Polyline({ path, map: null, strokeColor: '#ffffff', strokeWeight: 12, strokeOpacity: 0.95, zIndex: 30, clickable: false });
    const core = new google.maps.Polyline({ path, map: googleMap, strokeColor: color, strokeWeight: 7, strokeOpacity: 1, zIndex: 31 });
    const mid = midpointGM(part.coords);
    const badge = new google.maps.Marker({ position: mid, map: googleMap, zIndex: 50, clickable: false,
      icon: { path: google.maps.SymbolPath.CIRCLE, scale: 11, fillColor: color, fillOpacity: 1, strokeColor: '#fff', strokeWeight: 1.5 },
      label: { text: String(i + 1), color: '#fff', fontSize: '11px', fontWeight: '700' } });
    const a = path[path.length - 2], b = path[path.length - 1];
    const arrow = new google.maps.Marker({ position: b, map: googleMap, zIndex: 51, clickable: false,
      icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 3.8, rotation: headingDeg(a, b), fillColor: color, fillOpacity: 1, strokeColor: '#fff', strokeWeight: 1 } });
    previewPolylines[part.id] = { core, casing, badge, arrow };
    core.addListener('mouseover', () => setPreviewHover(part.id, true));
    core.addListener('mouseout', () => setPreviewHover(part.id, false));
  });
  const bounds = new google.maps.LatLngBounds();
  previewParts.forEach(p => p.coords.forEach(([lng, lat]) => bounds.extend({ lat, lng })));
  if (!bounds.isEmpty()) googleMap.fitBounds(bounds, { top: 60, right: 60, bottom: 60, left: 60 });
}

function setPreviewHover(partId, on) {
  previewHoverId = on ? partId : (previewHoverId === partId ? null : previewHoverId);
  Object.entries(previewPolylines).forEach(([id, o]) => {
    const hov = Number(id) === previewHoverId;
    if (o.casing) o.casing.setMap(hov ? googleMap : null);
    if (o.core) o.core.setOptions({ zIndex: hov ? 41 : 31 });
  });
  document.querySelectorAll('.preview-part').forEach(row =>
    row.classList.toggle('pv-hover', Number(row.dataset.partId) === previewHoverId));
}

// ── Flush pending debounced saves ─────────────────────────────────
function flushPendingSaves() {
  for (const [segId, timerId] of Object.entries(saveTimers)) {
    clearTimeout(timerId);
    const inp = document.getElementById(`seg-input-${segId}`);
    if (inp) saveSegName(parseInt(segId, 10), inp.value);
  }
  saveTimers = {};
}

// ── Save ──────────────────────────────────────────────────────────
async function saveSegName(segId, value) {
  const seg = projectData && projectData.segments.find(s => s.id === segId);
  if (!seg) return;
  const trimmed = value.trim();
  // Don't save if unchanged
  if ((seg.name || '') === trimmed) return;

  try {
    await apiPatch(`/api/segments/${segId}`, { name: trimmed });
    seg.name = trimmed || null;
    seg.named = !!trimmed;
    // Update input styling
    const inp = document.getElementById(`seg-input-${segId}`);
    if (inp) {
      inp.classList.toggle('named', !!trimmed);
    }
    recolorAfterSave(segId);
    updateProgressUI();
    showSaveIndicator();
  } catch (err) {
    console.error('Save failed:', err);
  }
}

async function saveCorrName(corrId, value) {
  const corr = getCorrObj(corrId);
  if (!corr) return;
  const trimmed = value.trim();
  if ((corr.name || '') === trimmed) return;
  try {
    await apiPatch(`/api/corridors/${corrId}`, { name: trimmed });
    corr.name = trimmed || null;
    showSaveIndicator();
  } catch (err) {
    console.error('Corridor save failed:', err);
  }
}

// Instantly reflect a just-saved segment's named status everywhere it shows.
function recolorAfterSave(segId) {
  const seg = projectData && projectData.segments.find(s => s.id === segId);
  if (!seg) return;
  const segCol = seg.named ? COLOR_NAMED : COLOR_UNNAMED;
  // Child segment line + endpoint nodes (if currently drawn)
  const entry = segPolylines[segId];
  if (entry) {
    entry.core.setOptions({ strokeColor: segCol });
    (entry.nodes || []).forEach(n => {
      const ic = n.getIcon();
      if (ic) n.setIcon(Object.assign({}, ic, { fillColor: segCol }));
    });
  }
  // Segment card accent (named -> green inset)
  const card = document.getElementById(`seg-card-${segId}`);
  if (card) card.classList.toggle('named', seg.named);
  // Parent corridor / standalone (dot, overview, meta count)
  const corrId = seg.corridor_id !== null ? seg.corridor_id : ('sa_' + segId);
  recolorCorr(corrId);
}

// A corridor/standalone is "named" (green) only when ALL its segments are named.
function recolorCorr(corrId) {
  const item = getVisibleCorridors().find(c => c.id === corrId);
  if (!item) return;
  const segs = segmentsOfItem(item);
  const allNamed = segs.length > 0 && segs.every(s => s.named);
  const col = allNamed ? COLOR_NAMED : COLOR_UNNAMED;
  // Overview polyline (when selected it's hidden under the child segments, so skip)
  const pl = corridorPolylines[corrId];
  if (pl && corrId !== selectedCorrId) pl.setOptions({ strokeColor: col });
  // Panel row: dot reflects status even while selected; refresh the "N unnamed" meta
  const row = document.getElementById(`corr-row-${corrId}`);
  if (row) {
    const dot = row.querySelector('.corr-dot');
    if (dot) dot.style.background = col;
    const meta = row.querySelector('.corr-meta');
    if (meta) {
      const unnamed = segs.filter(s => !s.named).length;
      meta.textContent = `${segs.length} seg${segs.length !== 1 ? 's' : ''} · ${unnamed} unnamed · ${fmtLen(itemLengthM(item))}`;
    }
  }
}

// ── Next unnamed ──────────────────────────────────────────────────
function jumpToNextUnnamed() {
  if (!projectData) return;

  // Search within current open corridor first, then others
  const allCorrs = getVisibleCorridors();
  let startIdx = allCorrs.findIndex(c => c.id === openCorrId);
  if (startIdx < 0) startIdx = 0;

  // Build ordered search: current corridor segs, then subsequent corridors
  const orderedCorrs = [
    ...allCorrs.slice(startIdx),
    ...allCorrs.slice(0, startIdx)
  ];

  for (const corr of orderedCorrs) {
    const segs = segmentsOfItem(corr);
    // If same corridor, look after the focused input
    const unnamedSegs = segs.filter(s => !s.named);
    if (unnamedSegs.length) {
      const seg = unnamedSegs[0];
      // Select corridor if needed
      selectCorridor(corr.id, 'next-unnamed');
      // After render, focus the input
      setTimeout(() => {
        focusSegmentCard(seg.id);
        const inp = document.getElementById(`seg-input-${seg.id}`);
        if (inp) inp.focus();
      }, 150);
      return;
    }
  }
  // All named
  alert('All segments are named! 🎉');
}

// ── Shared modal + hint toast ──────────────────────────────────────
let _hintTimer = null;
function showHint(msg) {

function closeModal() {
  document.getElementById('app-modal-overlay').classList.remove('show');
  document.getElementById('app-modal').innerHTML = '';
}
function showModal({ title, message = '', withInput = false, inputValue = '', confirmText = 'Confirm', onConfirm }) {

    <h3>${esc(title)}</h3>

    </div>`;
